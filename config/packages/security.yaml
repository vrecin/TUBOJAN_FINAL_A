security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api_public:
            pattern: ^/api/(register|login)
            stateless: true
            security: false
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticators:
                - 'App\Security\UserAuthenticator'        # Your regular form login
                - 'App\Security\GoogleAuthenticator'
            access_denied_handler: 'App\Security\AccessDeniedHandler'
            logout:
                path: app_logout
                # where to redirect after logout
                target: app_home
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                always_remember_me: true

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
    - { path: ^/api/register, roles: PUBLIC_ACCESS }
    - { path: ^/api/login, roles: PUBLIC_ACCESS }

    # PUBLIC PRODUCTS
    - { path: ^/api/products$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/products/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }

    # PROTECTED API
    - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

    - { path: ^/admin, roles: ROLE_ADMIN }
    - { path: ^/user, roles: ROLE_ADMIN }
    - { path: ^/activity/log, roles: ROLE_ADMIN }
    - { path: ^/category, roles: ROLE_ADMIN }
    - { path: ^/change/admin/password, roles: ROLE_ADMIN }
    - { path: ^/product, roles: [ROLE_ADMIN, ROLE_STAFF] }
    - { path: ^/orders, roles: [ROLE_ADMIN, ROLE_STAFF] }
    - { path: ^/staff/view/profile, roles: ROLE_STAFF }
    - { path: ^/change/staff/password, roles: ROLE_STAFF }
    - { path: ^/home, roles: PUBLIC_ACCESS }
    - { path: ^/about, roles: PUBLIC_ACCESS }
    - { path: ^/contact, roles: PUBLIC_ACCESS }
    - { path: ^/connect/google, roles: PUBLIC_ACCESS }
    - { path: ^/connect/google/check, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
